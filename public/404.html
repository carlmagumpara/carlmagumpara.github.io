<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Redirect all 404 requests to index.html
      var path = window.location.pathname;
      window.location.href = '/index.html' + path;
    </script>
  </head>
  <body></body>
</html>
